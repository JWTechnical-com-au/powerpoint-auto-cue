<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Companion Notes Display</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #000000;
    --text: #ffffff;
    --accent: #ffffff18;
    --accent-bright: #ffffff33;
    --dim: #666666;
    --font-size: 36px;
    --line-height: 1.65;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  /* ── CONTROL BAR ── */
  #controls {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    padding: 9px 14px;
    background: #000000dd;
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--accent-bright);
    transition: opacity 0.35s, transform 0.35s;
  }
  #controls.hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateY(-100%);
  }

  #controls label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--dim);
    white-space: nowrap;
  }

  #controls input[type="text"],
  #controls input[type="number"] {
    background: var(--accent);
    border: 1px solid var(--accent-bright);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 5px 9px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s;
  }
  #controls input:focus { border-color: #ffffff66; }

  #url-input      { width: 200px; }
  #port-input     { width: 68px; }
  #var-type       { background: var(--accent); border: 1px solid var(--accent-bright); color: var(--text); font-family: 'DM Mono', monospace; font-size: 11px; padding: 5px 6px; border-radius: 4px; cursor: pointer; outline: none; }
  #variable-input { width: 210px; }

  .sep { width: 1px; height: 22px; background: var(--accent-bright); flex-shrink: 0; }

  /* Size buttons */
  .size-group { display: flex; gap: 3px; align-items: center; }
  .size-btn {
    background: var(--accent);
    border: 1px solid var(--accent-bright);
    color: #aaa;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    border-radius: 3px;
    padding: 4px 7px;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .size-btn:hover { background: var(--accent-bright); color: #fff; }
  .size-btn.active { background: #ffffff22; border-color: #ffffff66; color: #fff; }
  #custom-size { width: 52px; text-align: center; }

  /* Buttons */
  .ctrl-btn {
    background: var(--accent);
    border: 1px solid var(--accent-bright);
    color: var(--text);
    cursor: pointer;
    border-radius: 4px;
    padding: 5px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .ctrl-btn:hover { background: var(--accent-bright); }

  /* Status */
  #status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.08em;
    white-space: nowrap;
  }
  #status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #333;
    transition: background 0.3s, box-shadow 0.3s;
  }
  #status-dot.connected { background: #22ff88; box-shadow: 0 0 7px #22ff8888; }
  #status-dot.error     { background: #ff4444; box-shadow: 0 0 7px #ff444488; }
  #status-dot.polling   { background: #ffaa00; box-shadow: 0 0 7px #ffaa0066; }

  /* ── SCROLL AREA ── */
  #scroll-wrapper {
    position: fixed;
    top: 50px; left: 0; right: 0; bottom: 0;
    overflow: hidden;
  }
  #content {
    padding: 52px 8vw 80px;
    font-size: var(--font-size);
    line-height: var(--line-height);
    font-weight: 300;
    letter-spacing: 0.01em;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Fullscreen behaviour */
  :fullscreen #scroll-wrapper, :-webkit-full-screen #scroll-wrapper { top: 0; }
  :fullscreen #controls, :-webkit-full-screen #controls { opacity:0; transform:translateY(-100%); pointer-events:none; }
  :fullscreen #controls.peek, :-webkit-full-screen #controls.peek { opacity:1; transform:translateY(0); pointer-events:all; }

  /* Placeholder */
  #placeholder {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: var(--dim);
    pointer-events: none;
    transition: opacity 0.4s;
  }
  #placeholder h2 { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 8px; }
  #placeholder p  { font-size: 13px; opacity: 0.5; }
  #placeholder.hidden { opacity: 0; }

  ::-webkit-scrollbar { display: none; }

  /* Help tooltip for variable format */
  #var-help {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: #555;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div id="controls">
  <label>Host</label>
  <input type="text" id="url-input" placeholder="192.168.1.100" value="localhost" />
  <label>:</label>
  <input type="number" id="port-input" value="8000" min="1" max="65535" />

  <div class="sep"></div>

  <label>Type</label>
  <select id="var-type">
    <option value="custom">Custom Var</option>
    <option value="module">Module Var</option>
  </select>

  <label id="var-label">Variable</label>
  <input type="text" id="variable-input" placeholder="$(PC_1_PPT:notes) or notes" value="" />
  <span id="var-help">custom-variable/notes/value</span>

  <button class="ctrl-btn" id="connect-btn">⟳ Connect</button>

  <div class="sep"></div>

  <label>Size</label>
  <div class="size-group" id="size-group">
    <button class="size-btn" data-size="18">XS</button>
    <button class="size-btn" data-size="26">S</button>
    <button class="size-btn active" data-size="36">M</button>
    <button class="size-btn" data-size="52">L</button>
    <button class="size-btn" data-size="72">XL</button>
    <button class="size-btn" data-size="96">2X</button>
    <input type="number" id="custom-size" placeholder="px" min="10" max="200" title="Custom font size" />
  </div>

  <div class="sep"></div>

  <button class="ctrl-btn" id="fs-btn">⛶ Fullscreen</button>

  <div id="status">
    <div id="status-dot"></div>
    <span id="status-text">Disconnected</span>
  </div>
</div>

<div id="scroll-wrapper">
  <div id="content"></div>
</div>

<div id="placeholder">
  <h2>Companion Notes</h2>
  <p>Set host, variable name, then click Connect</p>
</div>

<script>
/* ─── Scroll engine ─── */
let currentY = 0, targetY = 0, maxScroll = 0;
const content = document.getElementById('content');
const wrapper = document.getElementById('scroll-wrapper');
const placeholder = document.getElementById('placeholder');
const statusDot  = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const controls   = document.getElementById('controls');

function lerp(a,b,t){ return a+(b-a)*t; }
(function tick(){
  if(Math.abs(currentY - targetY) > 0.3){
    currentY = lerp(currentY, targetY, 0.1);
    content.style.transform = `translateY(${currentY}px)`;
  }
  requestAnimationFrame(tick);
})();

function calcMax(){ maxScroll = Math.min(0, -(content.scrollHeight - wrapper.clientHeight)); }

wrapper.addEventListener('wheel', e=>{
  e.preventDefault();
  calcMax();
  targetY -= e.deltaY * 1.15;
  targetY = Math.min(0, Math.max(maxScroll, targetY));
}, {passive:false});

let ty0 = 0;
wrapper.addEventListener('touchstart', e=>{ ty0 = e.touches[0].clientY; },{passive:true});
wrapper.addEventListener('touchmove', e=>{
  const dy = ty0 - e.touches[0].clientY; ty0 = e.touches[0].clientY;
  calcMax(); targetY -= dy*1.4;
  targetY = Math.min(0, Math.max(maxScroll, targetY));
},{passive:true});

window.addEventListener('resize',()=>{ calcMax(); targetY=Math.min(0,Math.max(maxScroll,targetY)); });

/* ─── Font size ─── */
function setSize(px){
  document.documentElement.style.setProperty('--font-size', px+'px');
  setTimeout(calcMax,50);
}
document.getElementById('size-group').addEventListener('click', e=>{
  const b = e.target.closest('.size-btn'); if(!b) return;
  document.querySelectorAll('.size-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  setSize(parseInt(b.dataset.size));
  document.getElementById('custom-size').value='';
});
document.getElementById('custom-size').addEventListener('change', e=>{
  const v=parseInt(e.target.value);
  if(v>=10&&v<=200){ document.querySelectorAll('.size-btn').forEach(x=>x.classList.remove('active')); setSize(v); }
});

/* ─── Parse variable input ─── */
// Accepts any of:
//   $(LABEL:varname)   → module var
//   $(varname)         → custom var
//   LABEL:varname      → module var
//   varname            → uses selected type
function parseVar(raw) {
  raw = raw.trim();
  // Strip $( ) wrapper if present
  const wrapped = raw.match(/^\$\((.+)\)$/);
  if (wrapped) raw = wrapped[1];
  // Check for LABEL:varname
  const ci = raw.indexOf(':');
  if (ci !== -1) {
    return { type: 'module', label: raw.slice(0, ci), name: raw.slice(ci + 1) };
  }
  // No colon — fall back to selected type
  const selectedType = document.getElementById('var-type').value;
  return { type: selectedType, label: null, name: raw };
}

/* ─── URL preview ─── */
function updateHelp(){
  const raw  = document.getElementById('variable-input').value || '…';
  const help = document.getElementById('var-help');
  const parsed = parseVar(raw);
  if(parsed.type === 'custom'){
    help.textContent = `→ /api/custom-variable/${parsed.name}/value`;
  } else {
    if(parsed.label){
      help.textContent = `→ /api/variable/${parsed.label}/${parsed.name}/value`;
    } else {
      help.textContent = `→ /api/variable/<label>/${parsed.name}/value`;
    }
  }
}
document.getElementById('var-type').addEventListener('change', ()=>{ updateHelp(); });
document.getElementById('variable-input').addEventListener('input', updateHelp);
updateHelp();

function updatePlaceholder(){
  const type = document.getElementById('var-type').value;
  document.getElementById('variable-input').placeholder = type==='custom' ? '$(notes) or notes' : '$(LABEL:varname) or LABEL:varname';
}

/* ─── Fullscreen ─── */
document.getElementById('fs-btn').addEventListener('click', ()=>{
  if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
});
document.addEventListener('fullscreenchange', ()=>{
  wrapper.style.top = document.fullscreenElement ? '0' : '50px';
  setTimeout(calcMax,100);
});
document.addEventListener('mousemove', e=>{
  if(document.fullscreenElement){
    if(e.clientY < 80) controls.classList.add('peek');
    else controls.classList.remove('peek');
  } else { controls.classList.remove('hidden','peek'); }
});

/* ─── Companion API fetch ─── */
let pollInterval = null, lastValue = null;

// Requests are routed through corsproxy.io so the browser never
// makes a direct cross-origin call — works from any hosted URL.
// allorigins returns JSON: { contents: "..." }
const CORS_PROXY = 'https://api.allorigins.win/get?url=';

function setStatus(cls, msg){ statusDot.className=cls; statusText.textContent=msg; }

function buildURL(){
  const host   = document.getElementById('url-input').value.trim()||'localhost';
  const port   = document.getElementById('port-input').value.trim()||'8000';
  const raw    = document.getElementById('variable-input').value.trim();
  const parsed = parseVar(raw);

  let apiURL;
  if(parsed.type === 'custom'){
    apiURL = `http://${host}:${port}/api/custom-variable/${encodeURIComponent(parsed.name)}/value`;
  } else {
    if(parsed.label){
      apiURL = `http://${host}:${port}/api/variable/${encodeURIComponent(parsed.label)}/${encodeURIComponent(parsed.name)}/value`;
    } else {
      apiURL = `http://${host}:${port}/api/variable/${encodeURIComponent(parsed.name)}/value`;
    }
  }
  return CORS_PROXY + encodeURIComponent(apiURL);
}

function showContent(text){
  if(text === lastValue) return;
  lastValue = text;
  if(!text && text !== 0){
    content.textContent=''; placeholder.classList.remove('hidden'); return;
  }
  placeholder.classList.add('hidden');
  content.textContent = String(text);
  calcMax();
}

async function poll(){
  try{
    const res = await fetch(buildURL(), {cache:'no-store'});
    if(!res.ok) throw new Error(`HTTP ${res.status} — check variable name & type`);
    const envelope = await res.json();
    // allorigins wraps response: { contents: "<raw text>", status: { http_code: 200 } }
    if(envelope.status && envelope.status.http_code && envelope.status.http_code !== 200){
      throw new Error(`HTTP ${envelope.status.http_code} — check variable name & type`);
    }
    const raw = envelope.contents || '';
    let val;
    try{ const j=JSON.parse(raw); val = (j && typeof j==='object' && 'value' in j) ? j.value : j; }
    catch(e){ val = raw; }
    setStatus('connected','Live ●');
    showContent(val);
  } catch(err){
    setStatus('error', err.message);
  }
}

function startPolling(){
  if(pollInterval) clearInterval(pollInterval);
  lastValue = null;
  poll();
  pollInterval = setInterval(poll, 500);
  setStatus('polling','Connecting…');
}

document.getElementById('connect-btn').addEventListener('click', startPolling);

/* ─── Keyboard ─── */
document.addEventListener('keydown', e=>{
  if(e.key==='Home'){ targetY=0; }
  if(e.key==='End'){ calcMax(); targetY=maxScroll; }
  if(e.key==='ArrowUp')  { targetY=Math.min(0,targetY+60); }
  if(e.key==='ArrowDown'){ calcMax(); targetY=Math.max(maxScroll,targetY-60); }
  if(e.key==='PageUp')   { targetY=Math.min(0,targetY+wrapper.clientHeight*0.8); }
  if(e.key==='PageDown') { calcMax(); targetY=Math.max(maxScroll,targetY-wrapper.clientHeight*0.8); }
});
</script>
</body>
</html>
